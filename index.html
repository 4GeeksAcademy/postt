<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Post</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Google Font Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="post">

        <div class="post-header">
            <div class="header-left">
                <i class="fa-brands fa-html5 html-icon"></i>

                <div>
                    <p class="title">HTML5</p>
                    <p class="subtitle">Rigoberto</p>
                </div>
            </div>

            <i class="fa-solid fa-ellipsis-vertical menu-icon"></i>
        </div>

        <div class="post-image">
            <img src="foto.png" alt="Instagram post image">
        </div>

        <div class="post-body">
            <div class="icons-row">
                <div class="left-icons">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-paper-plane"></i>
                </div>

                <i class="fa-regular fa-bookmark"></i>
            </div>

            <p class="likes">
                Liked by <strong>4GeeksAcademy</strong>, <strong>html5</strong>, 
                <strong>Web</strong> and <strong>100,000 others</strong>
            </p>

            <p class="description">
                No se que poner en la description.
            </p>
        </div>

    </div>

</body>
</html>
